<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출결 전용 키오스크 - 유현리드인 한그루역사</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19; /* Navy background */
      --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #1e1b4b 100%);
      --card-bg: #ffffff; /* Pure white name buttons for active students */
      --card-border: #cbd5e1;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      
      --accent-in: #10b981;
      --accent-out: #3b82f6;
      --accent-wait: #f59e0b;
      --accent-absent: #dc2626;
      --accent-makeup: #ec4899;
      --accent-cancelled: #64748b;
      
      --font-title: 'Outfit', 'Noto Sans KR', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      color: #ffffff; /* Text outside cards is white */
      font-family: var(--font-title);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      overflow-x: hidden;
    }

    /* Header (학원이름이 적혀있는 바 - 건드리지 않음) */
    header {
      background: #ffffff;
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .header-logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(to right, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .header-info {
      text-align: right;
    }

    .current-date {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .current-time {
      font-size: 2.2rem;
      font-weight: 800;
      color: #4f46e5;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 10px rgba(79, 70, 229, 0.1);
      margin-top: 0.2rem;
    }

    /* Time Slot Grouping */
    .time-slot-section {
      margin-bottom: 2rem;
    }

    .time-slot-header {
      font-size: 1.4rem;
      font-weight: 800;
      color: #ffffff; /* 시간 글자색은 화이트 */
      margin-bottom: 1rem;
      padding-left: 0.6rem;
      border-left: 5px solid #3b82f6;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.2rem;
    }

    /* Student Card Default (대기 / 보강 학생 - 백색으로 선명하게 부각) */
    .student-card {
      background: var(--card-bg); /* #ffffff */
      border: 2px solid var(--card-border); /* #cbd5e1 */
      border-radius: 18px;
      padding: 1.5rem 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 160px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    /* Active cards hover effects */
    .student-card.status-대기:hover,
    .student-card.status-보강:hover,
    .student-card.status-수업중:hover {
      transform: translateY(-4px);
      border-color: #4f46e5;
      box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
    }

    /* Top lines depending on status */
    .student-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: var(--text-muted);
    }

    .student-card.status-대기::before {
      background: var(--accent-wait);
    }

    .student-card.status-보강::before {
      background: var(--accent-makeup); /* Pink color line */
    }

    .student-card.status-수업중::before {
      background: var(--accent-in);
    }

    .student-card.status-수업완료::before {
      background: rgba(148, 163, 184, 0.3); /* Faded top line */
    }

    .student-card.status-결석::before {
      background: var(--accent-absent); /* Red color line */
    }

    .student-card.status-휴강::before {
      background: rgba(100, 116, 139, 0.3); /* Faded top line */
    }

    /* Active Card Text Colors */
    .student-card.status-대기 .student-name,
    .student-card.status-보강 .student-name {
      color: var(--text-primary); /* #0f172a (Charcoal) */
    }
    .student-card.status-대기 .student-grade,
    .student-card.status-보강 .student-grade {
      color: var(--text-secondary); /* #475569 */
    }

    /* 수업중 (수업 진행 학생 - 연한 초록빛 바탕으로 구분) */
    .student-card.status-수업중 {
      background: #f0fdf4;
      border-color: #a7f3d0;
    }
    .student-card.status-수업중 .student-name {
      color: #064e3b;
    }
    .student-card.status-수업중 .student-grade {
      color: #047857;
    }

    /* 수업완료 (네이비 바탕색에 반투명화, 단 테두리는 흐릿하게 노출) */
    .student-card.status-수업완료 {
      background: rgba(30, 41, 59, 0.4);
      border-color: rgba(255, 255, 255, 0.12); /* 흐릿하지만 형태는 보이도록 테두리 적용 */
      box-shadow: none;
    }
    .student-card.status-수업완료 .student-name {
      color: rgba(148, 163, 184, 0.7); /* Muted text */
    }
    .student-card.status-수업완료 .student-grade {
      color: rgba(148, 163, 184, 0.5);
    }

    /* 결석 (흐릿한 투명 처리 + 옅은 빨강 테두리 노출) */
    .student-card.status-결석 {
      background: rgba(30, 41, 59, 0.25);
      border-color: rgba(220, 38, 38, 0.25); /* 흐릿한 빨강 테두리 */
      box-shadow: none;
    }
    .student-card.status-결석 .student-name {
      color: rgba(148, 163, 184, 0.6);
    }
    .student-card.status-결석 .student-grade {
      color: rgba(148, 163, 184, 0.4);
    }

    /* 휴강 (가장 흐릿하게 투명 처리 + 아주 옅은 테두리 노출) */
    .student-card.status-휴강 {
      background: rgba(30, 41, 59, 0.15);
      border-color: rgba(255, 255, 255, 0.06); /* 아주 흐릿한 테두리 */
      box-shadow: none;
      opacity: 0.65;
    }
    .student-card.status-휴강 .student-name {
      color: rgba(148, 163, 184, 0.5);
    }
    .student-card.status-휴강 .student-grade {
      color: rgba(148, 163, 184, 0.35);
    }

    .student-name {
      font-size: 1.5rem;
      font-weight: 800;
      margin-top: 0.5rem;
      word-break: keep-all;
    }

    .student-grade {
      font-size: 0.9rem;
      margin-top: 0.4rem;
      font-weight: 600;
    }

    .status-badge {
      display: inline-block;
      align-self: center;
      font-size: 0.85rem;
      font-weight: 800;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      margin-top: 0.8rem;
    }

    /* Badge styles matching Korean sheet labels */
    .status-badge.status-대기 {
      background: rgba(245, 158, 11, 0.1);
      color: var(--accent-wait);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .status-badge.status-보강 {
      background: rgba(236, 72, 153, 0.1);
      color: var(--accent-makeup);
      border: 1px solid rgba(236, 72, 153, 0.3);
    }

    .status-badge.status-수업중 {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-in);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status-badge.status-수업완료 {
      background: rgba(255, 255, 255, 0.05);
      color: rgba(148, 163, 184, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-badge.status-결석 {
      background: rgba(220, 38, 38, 0.08);
      color: rgba(220, 38, 38, 0.7);
      border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .status-badge.status-휴강 {
      background: rgba(255, 255, 255, 0.03);
      color: rgba(148, 163, 184, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Live Remaining Time Tag */
    .remaining-time-tag {
      font-size: 0.85rem;
      font-weight: 700;
      color: #059669;
      margin-top: 0.5rem;
      background: rgba(16, 185, 129, 0.12);
      padding: 0.25rem 0.6rem;
      border-radius: 8px;
      display: inline-block;
      align-self: center;
    }

    .remaining-time-tag.completed {
      color: #64748b;
      background: rgba(148, 163, 184, 0.1);
    }

    /* Success Overlay */
    .success-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .success-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .success-icon {
      width: 120px;
      height: 120px;
      background: rgba(16, 185, 129, 0.1);
      border: 4px solid var(--accent-in);
      color: var(--accent-in);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      animation: pulse 2s infinite;
    }

    .success-icon.out {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--accent-out);
      color: var(--accent-out);
    }

    .success-title {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .success-message {
      font-size: 1.4rem;
      color: var(--text-secondary);
      margin-bottom: 3rem;
      text-align: center;
      line-height: 1.6;
    }

    .success-timer {
      font-size: 1rem;
      color: var(--text-muted);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.2); }
      70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* Initial sync progress loader */
    .initial-loader {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex: 1;
      gap: 1.5rem;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.15);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border-left-color: #3b82f6;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-logo">
      🏫 유현리드인 한그루역사 출결 키오스크
    </div>
    <div class="header-info">
      <div id="kioskDate" class="current-date">로딩 중...</div>
      <div id="kioskTime" class="current-time">00:00:00</div>
    </div>
  </header>

  <!-- Loader -->
  <div id="initialLoader" class="initial-loader">
    <div class="spinner"></div>
    <p style="font-size: 1.2rem; color: #ffffff;">스프레드시트에서 오늘 시간표를 불러오는 중입니다...</p>
  </div>

  <!-- Content (Hidden until loaded) -->
  <div id="kioskContent" style="display: none; flex-direction: column; flex: 1;">
    <!-- Student Cards Grid Grouped by Hour -->
    <section id="cardsContainer" style="display: flex; flex-direction: column; gap: 1rem; padding-bottom: 2rem;">
      <!-- Generated dynamically by time slots -->
    </section>
  </div>

  <!-- Announcement Overlay (Success & Warning Alerts) -->
  <div id="successOverlay" class="success-overlay">
    <div id="successIcon" class="success-icon">
      <svg width="60" height="60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    <div id="successTitle" class="success-title">등원 완료!</div>
    <div id="successMessage" class="success-message">
      강성모 학생, 안전하게 등원하였습니다.
    </div>
    <div id="successTimer" class="success-timer">3초 뒤 자동으로 화면이 닫힙니다...</div>
  </div>

  <!-- Scripts -->
  <script>
    // Constants
    const WEEKDAYS = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];

    // Custom Grade Weight for sorting (유치 -> 초1~6 -> 예비중 -> 중1~3 -> 예비고 -> 고1~3)
    const GRADE_ORDER = [
      "유치", "7세", "6세",
      "초1", "초2", "초3", "초4", "초5", "초6",
      "초등1", "초등2", "초등3", "초등4", "초등5", "초등6",
      "예비중", "중1", "중2", "중3", "예비고", "고1", "고2", "고3"
    ];
    
    function getGradeWeight(gradeStr) {
      if (!gradeStr) return 999;
      const clean = gradeStr.trim().replace(/\s+/g, '');
      const index = GRADE_ORDER.findIndex(g => clean.includes(g) || g.includes(clean));
      if (index !== -1) {
        return index;
      }
      if (clean.includes("유치")) return 0;
      if (clean.includes("초")) {
        const numMatch = clean.match(/\d/);
        if (numMatch) return 3 + parseInt(numMatch[0], 10);
        return 12;
      }
      if (clean.includes("예비중")) return 17;
      if (clean.includes("중")) {
        const numMatch = clean.match(/\d/);
        if (numMatch) return 20 + parseInt(numMatch[0], 10);
        return 25;
      }
      if (clean.includes("예비고")) return 27;
      if (clean.includes("고")) {
        const numMatch = clean.match(/\d/);
        if (numMatch) return 30 + parseInt(numMatch[0], 10);
        return 35;
      }
      return 999;
    }

    // Convert time string like "14:30" to total minutes from midnight for sorting
    function timeStringToMinutes(timeStr) {
      if (!timeStr || timeStr === "시간 외") return 9999;
      const parts = timeStr.trim().split(":");
      if (parts.length === 2) {
        const hrs = parseInt(parts[0], 10);
        const mins = parseInt(parts[1], 10);
        if (!isNaN(hrs) && !isNaN(mins)) {
          return hrs * 60 + mins;
        }
      }
      return 9999;
    }

    // Global state
    let state = {
      students: [],
      dailyLogs: [],
      memberAnalysis: []
    };
    
    let config = {
      gasWebhookUrl: "",
      smsMode: "local",
      smsLocalIp: "http://192.168.219.148:8080/send-sms",
      smsTemplateIn: "{name}학생이 유현리드인 한그루역사학원에 {time}에 등원하여 수업중입니다.",
      smsTemplateOut: "{name}학생이 유현리드인 한그루역사학원에 {time}에 수업을 마치고 하원하였습니다."
    };

    let selectedStudent = null;

    // Helper: Get student class duration in minutes based on classes string or grade
    function getClassDuration(student) {
      if (!student) return 60;
      const classesStr = student.classes || "";
      const match = classesStr.match(/(60|70|90|100|120|180)\s*분/);
      if (match) {
        return parseInt(match[1], 10);
      }
      const grade = student.grade || "";
      if (grade.includes("중") || grade.includes("고") || grade.includes("예비중")) {
        return 90;
      }
      return 60;
    }

    // Helper: Parse makeup date string into Day of week and Hour
    function parseMakeupDate(makeupStr) {
      if (!makeupStr) return null;
      try {
        let cleanStr = String(makeupStr).trim();
        const simpleMatch = cleanStr.match(/^([가-힣]{3})\s+(\d{2}:\d{2})$/);
        if (simpleMatch) {
          return { day: simpleMatch[1], time: simpleMatch[2], isWeekly: true };
        }
        cleanStr = cleanStr.replace(/\([가-힣]+\)/g, ' ').replace(/\s+/g, ' ').trim();
        cleanStr = cleanStr.replace(/\./g, '/').replace(/-/g, '/');
        if (cleanStr.match(/^\d{1,2}\/\d{1,2}/)) {
          const currentYear = new Date().getFullYear();
          cleanStr = `${currentYear}/${cleanStr}`;
        }
        const d = new Date(cleanStr);
        if (!isNaN(d.getTime())) {
          const day = WEEKDAYS[d.getDay()];
          const hours = String(d.getHours()).padStart(2, '0');
          const minutes = String(d.getMinutes()).padStart(2, '0');
          const month = d.getMonth() + 1;
          const date = d.getDate();
          return { 
            day, 
            time: `${hours}:${minutes}`, 
            isWeekly: false,
            formattedSlash: `${month}/${date}`,
            formattedDot: `${month}.${date}`
          };
        }
      } catch (e) {
        console.error("Error parsing makeup date: ", makeupStr, e);
      }
      return null;
    }

    // Helper: Parse comma-separated list of multiple makeup dates
    function parseMultipleMakeups(makeupStr) {
      if (!makeupStr) return [];
      const parts = String(makeupStr).split(',').map(p => p.trim()).filter(Boolean);
      const parsedList = [];
      parts.forEach(part => {
        const parsed = parseMakeupDate(part);
        if (parsed) {
          parsedList.push(parsed);
        }
      });
      return parsedList;
    }

    // Load Configuration & Sync
    function initKiosk() {
      // 1. Sync DateTime Clock
      updateClock();
      setInterval(updateClock, 1000);

      // 2. Parse configurations from URL parameters (painless sharing)
      const urlParams = new URLSearchParams(window.location.search);
      const paramGasUrl = urlParams.get("gas_webhook_url");
      const paramSmsMode = urlParams.get("sms_mode");
      const paramSmsLocalIp = urlParams.get("sms_local_ip");
      
      if (paramGasUrl) {
        localStorage.setItem("gas_webhook_url", decodeURIComponent(paramGasUrl));
      }
      if (paramSmsMode) {
        localStorage.setItem("sms_mode", paramSmsMode);
      }
      if (paramSmsLocalIp) {
        localStorage.setItem("sms_local_ip", decodeURIComponent(paramSmsLocalIp));
      }

      // Load configurations from localStorage
      config.gasWebhookUrl = localStorage.getItem("gas_webhook_url") || "";
      config.smsMode = localStorage.getItem("sms_mode") || "local";
      config.smsLocalIp = localStorage.getItem("sms_local_ip") || "http://192.168.219.148:8080/send-sms";
      config.smsTemplateIn = localStorage.getItem("sms_template_in") || config.smsTemplateIn;
      config.smsTemplateOut = localStorage.getItem("sms_template_out") || config.smsTemplateOut;

      // Try reading local cached state first
      const cached = localStorage.getItem("academy_attendance_state");
      if (cached) {
        try {
          const parsed = JSON.parse(cached);
          state.students = parsed.students || [];
          state.dailyLogs = parsed.dailyLogs || [];
          state.memberAnalysis = parsed.memberAnalysis || [];
        } catch(e) {
          console.error(e);
        }
      }

      // 3. Fetch fresh data from Google Sheets immediately
      fetchDataFromGoogleSheets();

      // Live remaining time countdown timer (updates remaining time displays every 10 seconds)
      setInterval(renderStudentCards, 10000);
    }

    function updateClock() {
      const now = new Date();
      
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const date = String(now.getDate()).padStart(2, '0');
      const day = WEEKDAYS[now.getDay()];
      
      document.getElementById("kioskDate").innerText = `${year}년 ${month}월 ${date}일 (${day})`;
      
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById("kioskTime").innerText = `${hours}:${minutes}:${seconds}`;
    }

    // Fetch data from google sheets API
    function fetchDataFromGoogleSheets() {
      if (!config.gasWebhookUrl) {
        showContent();
        return;
      }

      const separator = config.gasWebhookUrl.indexOf("?") !== -1 ? "&" : "?";
      const cacheBusterUrl = config.gasWebhookUrl + separator + "_t=" + Date.now();

      fetch(cacheBusterUrl)
        .then(res => res.json())
        .then(data => {
          if (data && typeof data === 'object') {
            state.students = data.students || [];
            state.dailyLogs = data.dailyLogs || [];
            state.memberAnalysis = data.memberAnalysis || [];
            
            // Save to shared localStorage so the main app also gets it
            const cached = localStorage.getItem("academy_attendance_state");
            let parsedState = {};
            if (cached) {
              try { parsedState = JSON.parse(cached); } catch(e){}
            }
            parsedState.students = state.students;
            parsedState.dailyLogs = state.dailyLogs;
            parsedState.memberAnalysis = state.memberAnalysis;
            localStorage.setItem("academy_attendance_state", JSON.stringify(parsedState));
          }
        })
        .catch(err => console.error("Kiosk sync error:", err))
        .finally(() => {
          showContent();
        });
    }

    function showContent() {
      document.getElementById("initialLoader").style.display = "none";
      document.getElementById("kioskContent").style.display = "flex";
      renderStudentCards();
    }

    function getTodayWeekday() {
      return WEEKDAYS[new Date().getDay()];
    }

    function getTodayDateStr() {
      const now = new Date();
      return `${now.getMonth() + 1}/${now.getDate()}`;
    }

    function renderStudentCards() {
      const container = document.getElementById("cardsContainer");
      container.innerHTML = "";
      
      const todayDay = getTodayWeekday();
      const todayDateSlash = getTodayDateStr(); // e.g. "7/1"
      const shortDay = todayDay.substring(0, 1);
      const dailyLogDateStr = `${todayDateSlash}${shortDay}`; // e.g. "7/1수"
      
      // Filter list of students scheduled for today or active today
      let filtered = state.students.filter(student => {
        const regTime = student.times && student.times[todayDay];
        const isScheduledToday = regTime && regTime.trim() !== "";
        
        let isMakeupToday = false;
        if (student.makeupDate) {
          const makeups = student.makeupDate.split(',').map(m => m.trim()).filter(Boolean);
          isMakeupToday = makeups.some(m => {
            return m.includes(todayDateSlash) || m.includes(todayDay) || (m.includes(shortDay) && m.includes('/'));
          });
        }
        
        const hasDailyLog = state.dailyLogs.some(log => 
          (log.name || "").trim() === (student.name || "").trim() && 
          (log.date || "").trim() === dailyLogDateStr.trim()
        );
        
        return isScheduledToday || isMakeupToday || hasDailyLog;
      });

      // Group students by HOURLY slot (정시 단위로 묶기)
      const groups = {};
      
      filtered.forEach(student => {
        let rawSlots = [];
        
        const log = state.dailyLogs.find(l => 
          (l.name || "").trim() === (student.name || "").trim() && 
          (l.date || "").trim() === dailyLogDateStr.trim()
        );
        
        // Determine time slot
        if (log && log.time) {
          rawSlots.push(log.time.trim());
        } else {
          const parsedMakeups = student.makeupDate ? parseMultipleMakeups(student.makeupDate) : [];
          const activeMakeup = parsedMakeups.find(m => 
            m && m.day === todayDay && (m.isWeekly || m.formattedSlash === todayDateSlash)
          );
          if (activeMakeup && activeMakeup.time) {
            rawSlots.push(activeMakeup.time.trim());
          } else {
            const regTime = student.times && student.times[todayDay];
            if (regTime && regTime.trim() !== "") {
              const parts = regTime.split(/[,/; ]+/).map(t => t.trim()).filter(Boolean);
              parts.forEach(p => rawSlots.push(p));
            }
          }
        }
        
        if (rawSlots.length === 0) {
          rawSlots.push("시간 외");
        }
        
        rawSlots = Array.from(new Set(rawSlots));
        
        rawSlots.forEach(rawSlot => {
          // Group by hourly slots, e.g. "14:30" or "14:00" -> "14:00"
          let hourSlot = "시간 외";
          if (rawSlot !== "시간 외") {
            const match = rawSlot.match(/^(\d{1,2})/);
            if (match) {
              const hour = parseInt(match[1], 10);
              hourSlot = `${String(hour).padStart(2, '0')}:00`;
            }
          }
          
          if (!groups[hourSlot]) {
            groups[hourSlot] = [];
          }
          
          const alreadyAdded = groups[hourSlot].some(item => item.student.id === student.id);
          if (!alreadyAdded) {
            groups[hourSlot].push({ student, log, exactTime: rawSlot });
          }
        });
      });

      // Sort hourly slots chronologically
      const sortedSlots = Object.keys(groups).sort((a, b) => {
        if (a === "시간 외") return 1;
        if (b === "시간 외") return -1;
        return a.localeCompare(b);
      });

      if (sortedSlots.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 5rem; color: #94a3b8; font-size: 1.3rem;">
            오늘 예정된 등하원 수업 시간표가 없습니다.
          </div>
        `;
        return;
      }

      sortedSlots.forEach(slot => {
        const list = groups[slot];
        
        // 정렬 기준 고도화:
        // 1순위: 분 단위로 빠른 순 (exactTime 분 환산 기준 오름차순)
        // 2순위: 학년 순 (Grade Weight 오름차순)
        // 3순위: 이름 가나다 순 (Name 오름차순)
        list.sort((a, b) => {
          const minutesA = timeStringToMinutes(a.exactTime);
          const minutesB = timeStringToMinutes(b.exactTime);
          if (minutesA !== minutesB) {
            return minutesA - minutesB;
          }
          
          const weightA = getGradeWeight(a.student.grade);
          const weightB = getGradeWeight(b.student.grade);
          if (weightA !== weightB) {
            return weightA - weightB;
          }
          
          return (a.student.name || "").localeCompare(b.student.name || "");
        });

        // Render Section Header
        const section = document.createElement("div");
        section.className = "time-slot-section";
        
        const heading = document.createElement("h2");
        heading.className = "time-slot-header";
        heading.innerText = `🕒 ${slot} 수업`;
        section.appendChild(heading);
        
        const grid = document.createElement("div");
        grid.className = "cards-grid";

        list.forEach(({ student, log, exactTime }) => {
          let status = "대기";
          let statusClass = "대기";
          let remainingTimeHtml = "";

          const parsedMakeups = student.makeupDate ? parseMultipleMakeups(student.makeupDate) : [];
          const isMakeup = parsedMakeups.some(m => 
            m && m.day === todayDay && (m.isWeekly || m.formattedSlash === todayDateSlash)
          );
          
          if (isMakeup) {
            status = "보강";
            statusClass = "보강";
          }

          if (log) {
            const norm = log.status || "대기";
            if (norm === "수업중") {
              status = "수업중";
              statusClass = "수업중";
              
              if (log.inTime) {
                const inTimeParts = log.inTime.split(":");
                if (inTimeParts.length === 2) {
                  const inHrs = parseInt(inTimeParts[0], 10);
                  const inMins = parseInt(inTimeParts[1], 10);
                  const now = new Date();
                  const inDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), inHrs, inMins, 0);
                  const durationMins = getClassDuration(student);
                  const elapsedMins = Math.floor((now.getTime() - inDate.getTime()) / 60000);
                  const remainingMins = durationMins - elapsedMins;
                  
                  if (remainingMins > 0) {
                    remainingTimeHtml = `<div class="remaining-time-tag">⏳ 남은 시간: ${remainingMins}분</div>`;
                  } else {
                    remainingTimeHtml = `<div class="remaining-time-tag completed">✅ 수업완료 (시간경과)</div>`;
                  }
                }
              }
            } else if (norm === "수업완료" || norm === "보강완료") {
              status = "수업완료";
              statusClass = "수업완료";
            } else if (norm === "결석") {
              status = "결석";
              statusClass = "결석";
            } else if (norm === "휴강") {
              status = "휴강";
              statusClass = "휴강";
            }
          }

          const card = document.createElement("div");
          card.className = `student-card status-${statusClass}`;
          
          const timeDisplay = exactTime && exactTime !== "시간 외" ? ` (${exactTime})` : "";

          card.innerHTML = `
            <div>
              <div class="student-name">${student.name || ""}</div>
              <div class="student-grade">${student.grade || ""}${timeDisplay}</div>
              ${remainingTimeHtml}
            </div>
            <span class="status-badge status-${statusClass}">${status}</span>
          `;
          
          card.onclick = () => handleCardOneTouch(student, status);
          grid.appendChild(card);
        });

        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    // Direct Check-in / Check-out on click without modal choices
    function handleCardOneTouch(student, currentStatus) {
      const todayDay = getTodayWeekday();
      const todayDateSlash = getTodayDateStr();
      const shortDay = todayDay.substring(0, 1);
      const dailyLogDateStr = `${todayDateSlash}${shortDay}`;

      if (currentStatus === "대기" || currentStatus === "보강") {
        selectedStudent = student;
        processKioskAttendance("in");
      } 
      else if (currentStatus === "수업중") {
        const log = state.dailyLogs.find(l => 
          (l.name || "").trim() === (student.name || "").trim() && 
          (l.date || "").trim() === dailyLogDateStr.trim()
        );

        if (log && log.inTime) {
          const inTimeParts = log.inTime.split(":");
          if (inTimeParts.length === 2) {
            const inHrs = parseInt(inTimeParts[0], 10);
            const inMins = parseInt(inTimeParts[1], 10);
            const now = new Date();
            const inDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), inHrs, inMins, 0);
            const durationMins = getClassDuration(student);
            const elapsedMins = Math.floor((now.getTime() - inDate.getTime()) / 60000);
            const remainingMins = durationMins - elapsedMins;
            
            if (remainingMins > 0) {
              showTemporaryNotice(student.name, `수업시간이 ${remainingMins}분 남았습니다.`, true);
              return;
            }
          }
        }

        selectedStudent = student;
        processKioskAttendance("out");
      } 
      else if (currentStatus === "수업완료") {
        showTemporaryNotice(student.name, "오늘 일정이 수업완료되었습니다. 😊");
      } 
      else if (currentStatus === "결석") {
        showTemporaryNotice(student.name, "오늘 결석 처리되었습니다. 🏫");
      } 
      else if (currentStatus === "휴강") {
        showTemporaryNotice(student.name, "오늘 휴강 처리되었습니다. 🏫");
      }
    }

    // Temporary notice overlay
    function showTemporaryNotice(name, message, isWarning = false) {
      const overlay = document.getElementById("successOverlay");
      const icon = document.getElementById("successIcon");
      const title = document.getElementById("successTitle");
      const msg = document.getElementById("successMessage");
      const timerText = document.getElementById("successTimer");
      
      if (isWarning) {
        icon.className = "success-icon";
        icon.style.borderColor = "#ef4444";
        icon.style.color = "#ef4444";
        icon.style.background = "rgba(239, 68, 68, 0.1)";
        icon.innerHTML = `
          <svg width="60" height="60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        `;
        title.innerText = "수업 시간 미달 ⏳";
        msg.innerHTML = `<strong>${name}</strong> 학생, ${message}<br>정해진 수업 시간을 모두 채운 뒤 하원해 주세요!`;
      } else {
        icon.className = "success-icon out";
        icon.style.borderColor = "#3b82f6";
        icon.style.color = "#3b82f6";
        icon.style.background = "rgba(59, 130, 246, 0.1)";
        icon.innerHTML = `
          <svg width="60" height="60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        `;
        title.innerText = "안내";
        msg.innerHTML = `<strong>${name}</strong> 학생은 ${message}`;
      }
      
      timerText.innerText = "잠시 후 화면이 닫힙니다...";
      overlay.classList.add("active");
      
      setTimeout(() => {
        overlay.classList.remove("active");
      }, 3000);
    }

    // Process attendance (in/out)
    function processKioskAttendance(type) {
      if (!selectedStudent) return;
      
      const student = selectedStudent;
      const todayDay = getTodayWeekday();
      const todayDateSlash = getTodayDateStr();
      const shortDay = todayDay.substring(0, 1);
      const dailyLogDateStr = `${todayDateSlash}${shortDay}`;
      
      const now = new Date();
      const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      const activeTime = student.times && student.times[todayDay] ? student.times[todayDay].trim() : currentTime;
      
      let dailyStatus = type === 'in' ? '수업중' : '수업완료';

      // Find if daily log exists
      let dailyLog = state.dailyLogs.find(log => 
        (log.name || '').replace(/\s+/g, '') === (student.name || '').replace(/\s+/g, '') && 
        log.time.trim() === activeTime.trim() && 
        (log.date || '').trim() === dailyLogDateStr.trim()
      );

      // Perform local updates
      if (dailyLog) {
        dailyLog.status = dailyStatus;
        if (type === 'in') {
          dailyLog.inTime = currentTime;
        } else {
          dailyLog.outTime = currentTime;
        }
        
        if (config.gasWebhookUrl) {
          const updates = [
            { tab: "dailyLogs", row: dailyLog.row, field: "status", value: dailyStatus }
          ];
          if (type === 'in') {
            updates.push({ tab: "dailyLogs", row: dailyLog.row, field: "inTime", value: currentTime });
          } else {
            updates.push({ tab: "dailyLogs", row: dailyLog.row, field: "outTime", value: currentTime });
          }
          sendBatchUpdateToGoogleSheets(updates);
        }
      } else {
        const nextRow = state.dailyLogs.length > 0 ? Math.max(...state.dailyLogs.map(l => l.row)) + 1 : 2;
        dailyLog = {
          id: 'daily_' + nextRow,
          row: nextRow,
          date: dailyLogDateStr,
          time: activeTime,
          name: student.name,
          notes: student.notes || "",
          status: dailyStatus,
          inTime: type === 'in' ? currentTime : "",
          outTime: type === 'out' ? currentTime : "",
          reason: "", number: "", event: "", grammarDone: "", specialClass: "", contents: ""
        };
        state.dailyLogs.push(dailyLog);
        
        if (config.gasWebhookUrl) {
          sendNewDailyLogToGoogleSheets(dailyLog);
        }
      }

      const cached = localStorage.getItem("academy_attendance_state");
      if (cached) {
        try {
          const parsed = JSON.parse(cached);
          parsed.dailyLogs = state.dailyLogs;
          localStorage.setItem("academy_attendance_state", JSON.stringify(parsed));
        } catch(e){}
      }

      if (type === 'in') {
        student.attendanceStatus = '수업중';
      } else {
        student.attendanceStatus = '수업완료';
      }

      sendKioskSmsNotification(student, type, type === 'in' ? currentTime : currentTime);
      showSuccessOverlay(student.name, type);
    }

    // Success Screen Popup & Auto closing
    function showSuccessOverlay(name, type) {
      const overlay = document.getElementById("successOverlay");
      const icon = document.getElementById("successIcon");
      const title = document.getElementById("successTitle");
      const msg = document.getElementById("successMessage");
      
      icon.style.borderColor = "";
      icon.style.color = "";
      icon.style.background = "";
      
      if (type === 'in') {
        icon.className = "success-icon";
        title.innerText = "등원 완료! 🏫";
        msg.innerHTML = `<strong>${name}</strong> 학생이 안전하게 등원하였습니다.<br>오늘도 유현리드인 한그루역사에서 즐겁게 공부해 봅시다!`;
        icon.innerHTML = `
          <svg width="60" height="60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        `;
      } else {
        icon.className = "success-icon out";
        title.innerText = "하원 완료! 🏡";
        msg.innerHTML = `<strong>${name}</strong> 학생이 안전하게 하원하였습니다.<br>오늘 공부하느라 수고 많았어요! 조심히 들어가세요!`;
        icon.innerHTML = `
          <svg width="60" height="60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        `;
      }
      
      overlay.classList.add("active");
      
      let timeLeft = 3;
      const timerText = document.getElementById("successTimer");
      timerText.innerText = `${timeLeft}초 뒤 자동으로 화면이 닫힙니다...`;
      
      const interval = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          timerText.innerText = `${timeLeft}초 뒤 자동으로 화면이 닫힙니다...`;
        } else {
          clearInterval(interval);
          overlay.classList.remove("active");
          selectedStudent = null;
          renderStudentCards();
        }
      }, 1000);
    }

    // Google Sheets API Helpers
    function sendBatchUpdateToGoogleSheets(updates) {
      fetch(config.gasWebhookUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "batchUpdate",
          updates: updates
        })
      }).catch(err => console.error("Kiosk batch update error:", err));
    }

    function sendNewDailyLogToGoogleSheets(log) {
      fetch(config.gasWebhookUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "addDailyLog",
          date: log.date,
          time: log.time,
          name: log.name,
          status: log.status,
          inTime: log.inTime || "",
          outTime: log.outTime || "",
          notes: log.notes || ""
        })
      }).catch(err => console.error("Kiosk log add error:", err));
    }

    // SMS Sender logic
    function sendKioskSmsNotification(student, type, timeStr) {
      const member = state.memberAnalysis.find(m => (m.name || '').replace(/\s+/g, '') === (student.name || '').replace(/\s+/g, ''));
      const rawPhone = member ? (member.phone || "") : "";
      const cleanPhone = rawPhone.replace(/[^0-9]/g, '');
      
      if (!cleanPhone) {
        console.warn("No phone number found for SMS:", student.name);
        return;
      }

      const template = type === "in" ? config.smsTemplateIn : config.smsTemplateOut;
      const message = template
        .replace(/{name}/g, student.name)
        .replace(/{time}/g, timeStr);

      console.log(`[Kiosk SMS Send] Mode: ${config.smsMode}, To: ${cleanPhone}, Msg: ${message}`);

      if (config.smsMode === "click") {
        const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
        let smsUrl = `sms:${cleanPhone}`;
        if (isMobile) {
          const separator = /iPhone|iPad|iPod/i.test(navigator.userAgent) ? "&" : "?";
          smsUrl += `${separator}body=${encodeURIComponent(message)}`;
        } else {
          smsUrl += `?body=${encodeURIComponent(message)}`;
        }
        window.open(smsUrl, "_blank");
        
      } else if (config.smsMode === "auto") {
        const apiKey = localStorage.getItem("sms_api_key");
        const deviceId = localStorage.getItem("sms_device_id");
        if (!apiKey || !deviceId) return;
        
        fetch(`https://api.textbee.dev/api/v1/gateway/devices/${deviceId}/send-sms`, {
          method: "POST",
          headers: {
            "x-api-key": apiKey,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            recipients: [cleanPhone],
            message: message
          })
        }).catch(err => console.error("Kiosk Textbee SMS send error:", err));
        
      } else if (config.smsMode === "local") {
        if (!config.smsLocalIp) return;
        
        let targetUrl = config.smsLocalIp.trim();
        if (!targetUrl.startsWith("http://") && !targetUrl.startsWith("https://")) {
          targetUrl = "http://" + targetUrl;
        }
        
        let sendUrl = targetUrl;
        let hasCustomPath = targetUrl.includes("/send") || targetUrl.includes("/sms") || targetUrl.includes("/message");
        if (!hasCustomPath) {
          sendUrl = targetUrl.endsWith("/") ? targetUrl + "send" : targetUrl + "/send";
        }

        const payload = {
          to: cleanPhone,
          phone: cleanPhone,
          number: cleanPhone,
          recipients: [cleanPhone],
          message: message
        };

        fetch(sendUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        })
        .then(res => {
          if (!res.ok && !hasCustomPath) {
            return fetch(targetUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
          }
          return res;
        })
        .catch(err => console.error("Kiosk Local Wi-Fi SMS gateway error:", err));
      }
    }

    // Run on startup
    window.onload = initKiosk;
  </script>
